name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate YAML
        run: |
          pip install yamllint
          find . -name '*.yml' -o -name '*.yaml' | xargs yamllint -d relaxed || true
      - name: Validate Docker Compose files
        run: |
          for f in $(find . -name 'docker-compose*.yml' -o -name 'docker-compose*.yaml'); do
            echo "Checking $f..."
            docker compose -f "$f" config --quiet 2>&1 || echo "WARNING: $f has issues"
          done
      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          find . -name '*.sh' -exec shellcheck {} + || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Skip PR gitleaks scan
        if: github.event_name == 'pull_request'
        run: echo "Skipping gitleaks on pull_request event."
      - name: Gitleaks secret scan
        if: github.event_name != 'pull_request'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
